<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Search</title>
    
    <style>
        .search-element {
            display: block;
            margin-bottom: 5px;
        }

        .result-container {
            background-color: #9b9b9bd5;
            border-radius: 6px;
            padding-left: 20px;
            padding-bottom: 20px;
            padding-right: 20px;
            margin-top: 20px; 
        }

        .meaning-card {
            background-color: #f0eeeed5; 
            border-radius: 6px; 
            padding-bottom: 3px; 
            padding-left: 10px;
            margin-bottom: 15px; 
        }
    </style>
</head>
<body>
    
    <div>
        <label for="toSearch" class="search-element">Insert a word to search:</label>
        <input type="text" id="toSearch" class="search-element">
        <button type="button" onclick="
            var word = document.getElementById('toSearch').value;
            search(word);
        ">Search</button>
    </div>

    <div id="resultContainer" class="result-container"> </div>

    <script>
        function search(word){
            var url = 'https://api.dictionaryapi.dev/api/v2/entries/en/' + word; 
            getData(url);
        }

        const resultContainer = document.getElementById("resultContainer");
        let HtmlElemnts;

        async function getData(url) {
            console.log("the url is sent and it is: " + url)
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                const result = await response.json();
                HtmlElemnts = `<h3>The word is ${result[0].word}</h3>`;
                
                const meanings = result[0].meanings;

                meanings.forEach(element => {
                    HtmlElemnts += `<div class="meaning-card">`
                    HtmlElemnts += `<h3>The word is: {${element.partOfSpeech}}</h3>`

                    HtmlElemnts += `<ul>`
                        element.definitions.forEach(miniElement => {
                            HtmlElemnts += `<li>${miniElement.definition}</li>`
                            
                            if(miniElement.example != undefined){
                                HtmlElemnts += `<ul><li><i>example: ${miniElement.example}</i></li></ul>`
                            }
                            HtmlElemnts += `<br>`

                        });
                    HtmlElemnts += `</ul>`
                    HtmlElemnts += `</div>`
                });
                
            } catch (error) {
                console.error(error.message);
                HtmlElemnts = `<h1>word not found!!</h1>`
            }
            resultContainer.innerHTML = HtmlElemnts;
        }
    </script>

</body>
</html>
